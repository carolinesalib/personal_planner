default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("DB_HOST", "localhost") %>
  username: <%= ENV.fetch("DB_USERNAME", "postgres") %>
  password: <%= ENV.fetch("DB_PASSWORD", "postgres") %>

development:
  <<: *default
  database: personal_planner_development

test:
  <<: *default
  database: personal_planner_test

production:
  primary:
    <<: *default
    database: personal_planner_production
    username: <%= ENV["DB_USERNAME"] %>
    password: <%= ENV["DB_PASSWORD"] %>
    host: <%= ENV["DB_HOST"] %>
  cache:
    <<: *default
    database: personal_planner_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: personal_planner_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: personal_planner_production_cable
    migrations_paths: db/cable_migrate
